services:
  - type: web
    name: mcq-solver
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: GEMINI_API_KEYS
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: SECRET_KEY
        generateValue: true
    plan: free
